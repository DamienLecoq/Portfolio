<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Le titre est injecté par app.js depuis data.json -->
    <title>Portfolio</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/5df1c49769.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body class="bg-gray-900 text-white">
<div id="Main-Page">

    <!-- ===== NAVBAR ===== -->
    <header id="NavBar" class="fixed top-0 w-full z-50 backdrop-blur-xl border-b border-white/5" style="background: rgba(10,15,28,0.82);">
        <div class="container mx-auto flex justify-between items-center py-3.5 px-6">

            <!-- Logo (contenu injecté par JS) -->
            <a href="#accueil" id="nav-logo" class="flex items-center gap-3 group">
                <span id="nav-initials" class="logo-badge"></span>
                <span id="nav-name" class="text-lg font-bold gradient-text tracking-wide"></span>
            </a>

            <!-- Liens de navigation desktop (injectés par JS) -->
            <nav id="nav-desktop" class="hidden md:flex items-center gap-1"></nav>

            <!-- Actions desktop : icônes sociales + bouton CV (injectés par JS) -->
            <div id="nav-actions" class="hidden md:flex items-center gap-2"></div>

            <!-- Burger mobile -->
            <button id="menu-toggle" class="md:hidden text-white p-1.5 text-xl w-9 h-9 flex items-center justify-center rounded-lg transition-colors hover:bg-white/10">
                <i id="burger-icon" class="fa-solid fa-bars"></i>
            </button>
        </div>

        <!-- Menu mobile (nav + sociales injectés par JS) -->
        <div id="mobile-menu" class="hidden md:hidden backdrop-blur-xl border-t border-white/5" style="background: rgba(10,15,28,0.95);">
            <nav class="flex flex-col items-center gap-3 py-6 px-4">
                <div id="nav-mobile" class="flex flex-col items-center gap-3 w-full"></div>
                <div id="mobile-socials" class="flex gap-4 mt-2 pt-3 border-t border-white/10 w-full justify-center"></div>
            </nav>
        </div>
    </header>

    <!-- ===== HERO ===== -->
    <section id="accueil" class="h-screen flex items-center justify-center relative">
        <!-- Carousel (images injectées par JS) -->
        <div id="carousel" class="absolute inset-0 carousel"></div>

        <div class="carousel-overlay"></div>
        <div id="particles-container" class="absolute inset-0 overflow-hidden pointer-events-none" style="z-index:2;"></div>

        <div class="relative flex flex-col items-center gap-6 text-center px-4" style="z-index:3;">
            <!-- Titre et sous-titre injectés par JS -->
            <h1 id="Title" class="text-4xl sm:text-6xl md:text-8xl font-bold"></h1>
            <h2 id="SubTitle" class="text-2xl md:text-3xl font-semibold"></h2>
        </div>

        <a id="DownButton" href="#competences" class="absolute bottom-12 border rounded-full px-4 py-2.5 text-xl" style="z-index:3;">
            <i class="fa-solid fa-arrow-down"></i>
        </a>
    </section>

    <!-- ===== COMPÉTENCES ===== -->
    <section id="competences" class="py-16" style="background: linear-gradient(180deg, #1a202c 0%, #111827 100%);">
        <div class="container mx-auto text-center px-4">
            <h2 class="text-3xl font-bold mb-10 section-title reveal">Compétences techniques</h2>
            <!-- Boutons de filtre injectés par JS depuis skillCategories -->
            <div id="filter-buttons" class="flex flex-wrap justify-center gap-3 mb-10 reveal"></div>
            <div id="skills-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 reveal"></div>
        </div>
    </section>

    <!-- ===== PROJETS ===== -->
    <section id="projets" class="py-16" style="background: linear-gradient(180deg, #111827 0%, #1a202c 100%);">
        <div class="container mx-auto text-center px-4">
            <h2 class="text-3xl mb-12 font-bold section-title reveal">Projets</h2>
            <!-- Cartes injectées par JS -->
            <div id="cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 reveal"></div>
            <button id="ShowProjectButton" class="btn-secondary px-7 py-3 rounded-full text-sm font-medium">
                <i class="fa-solid fa-grid-2 mr-2"></i>Tous les projets
            </button>
            <div id="secondary-projects" class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-10"></div>
        </div>
    </section>

    <!-- ===== À PROPOS ===== -->
    <section id="a-propos" class="py-16" style="background: linear-gradient(180deg, #1a202c 0%, #111827 100%);">
        <div class="container mx-auto text-center px-4">
            <h2 class="text-3xl font-bold mb-10 section-title reveal">À propos</h2>
            <!-- Contenu entièrement injecté par JS depuis data.about -->
            <div id="about-content" class="reveal"></div>
        </div>
    </section>

    <!-- ===== CONTACT ===== -->
    <section id="contact" class="py-16" style="background: linear-gradient(180deg, #111827 0%, #0f172a 100%);">
        <div class="contact-bg-glow" aria-hidden="true"></div>
        <div class="container mx-auto text-center px-4 relative">
            <h2 class="text-3xl font-bold mb-4 section-title reveal">Contact</h2>
            <!-- Intro et cartes injectées par JS depuis data.contact -->
            <div id="contact-intro" class="reveal"></div>
            <div id="contact-cards" class="flex flex-col sm:flex-row justify-center gap-5 max-w-4xl mx-auto reveal"></div>
            <p id="contact-phone" class="mt-8 text-gray-600 text-xs reveal"></p>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="py-5 border-t border-white/5" style="background: #0f172a;">
        <div class="container mx-auto text-center text-gray-500 text-sm">
            <!-- Contenu injecté par JS depuis data.meta -->
            <p>© <span id="footer-year"></span> <span id="footer-name" class="gradient-text font-medium"></span>. Tous droits réservés.</p>
        </div>
    </footer>

</div>

<!-- Scripts différés – exécution séquentielle après parsing DOM -->
<script src="./src/header.js"     defer></script>
<script src="./src/skills.js"     defer></script>
<script src="./src/projects.js"   defer></script>
<script src="./src/animations.js" defer></script>
<script src="./src/app.js"        defer></script>
</body>
</html>
